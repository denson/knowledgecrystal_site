<header class="site-header">
  <div class="wrapper">
    <div class="header-content">
      <a class="site-title" href="{{ '/' | prepend: site.baseurl }}">
        <span class="site-title-text">{{ site.title }}</span>
      </a>

      <nav class="site-nav">
        <input type="checkbox" id="nav-toggle" class="nav-toggle" />
        <label for="nav-toggle" class="nav-toggle-label">
          <span class="hamburger"></span>
        </label>

        <ul class="nav-menu">
          <li class="nav-item">
            <a class="nav-link {% if page.url == '/' %}active{% endif %}" href="{{ '/' | prepend: site.baseurl }}">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if page.url == '/about/' %}active{% endif %}" href="{{ '/about' | prepend: site.baseurl }}">About</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if page.url == '/projects/' %}active{% endif %}" href="{{ '/projects' | prepend: site.baseurl }}">Projects</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if page.url == '/blog/' %}active{% endif %}" href="{{ '/blog' | prepend: site.baseurl }}">Blog</a>
          </li>
        </ul>
      </nav>
    </div>
  </div>
</header>
