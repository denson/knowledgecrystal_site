<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncatewords: 160 }}">
  <link rel="canonical" href="{{ page.url | replace: 'index.html', '' | prepend: site.baseurl | prepend: site.url }}">

  <style>
    /* Reset & Base Styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #1a1a2e;
      color: #e8e8f0;
      line-height: 1.6;
      font-size: 16px;
    }

    /* Typography */
    h1, h2, h3, h4, h5, h6 {
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 0.5em;
      margin-top: 1.5em;
      color: #f5f5f5;
    }

    h1 {
      font-size: 2.5rem;
    }

    h2 {
      font-size: 2rem;
    }

    h3 {
      font-size: 1.5rem;
    }

    h4 {
      font-size: 1.25rem;
    }

    p {
      margin-bottom: 1rem;
    }

    a {
      color: #f59e0b;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    a:hover {
      color: #fbbf24;
    }

    /* Navigation Bar */
    nav.site-nav {
      background-color: #0f0f1e;
      padding: 1rem 0;
      border-bottom: 1px solid rgba(245, 158, 11, 0.1);
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .nav-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .site-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f59e0b;
      transition: all 0.3s ease;
    }

    .site-title:hover {
      color: #fbbf24;
    }

    .nav-links {
      display: flex;
      list-style: none;
      gap: 2rem;
    }

    .nav-links a {
      color: #e8e8f0;
      font-weight: 500;
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      transition: all 0.3s ease;
      position: relative;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: #f59e0b;
      background-color: rgba(245, 158, 11, 0.1);
    }

    /* Main Content */
    main.page-content {
      min-height: calc(100vh - 200px);
      padding: 3rem 0;
    }

    .wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* Footer */
    footer.site-footer {
      background-color: #0f0f1e;
      border-top: 1px solid rgba(245, 158, 11, 0.1);
      padding: 3rem 0;
      margin-top: 4rem;
    }

    .footer-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
      text-align: center;
      color: #b0b0b8;
    }

    .footer-wrapper p {
      margin-bottom: 0.5rem;
    }

    .footer-wrapper a {
      color: #f59e0b;
    }

    /* Hero Section */
    .hero {
      text-align: center;
      padding: 4rem 0;
      background: linear-gradient(135deg, rgba(245, 158, 11, 0.1) 0%, rgba(245, 158, 11, 0.05) 100%);
      border-radius: 12px;
      margin-bottom: 3rem;
    }

    .hero h1 {
      font-size: 3.5rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #f59e0b, #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero .tagline {
      font-size: 1.25rem;
      color: #c0c0c8;
      margin-bottom: 2rem;
      font-weight: 300;
    }

    .cta-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-weight: 600;
      transition: all 0.3s ease;
      cursor: pointer;
      border: none;
      text-decoration: none;
    }

    .btn-primary {
      background-color: #f59e0b;
      color: #1a1a2e;
    }

    .btn-primary:hover {
      background-color: #fbbf24;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
    }

    .btn-secondary {
      background-color: transparent;
      color: #f59e0b;
      border: 2px solid #f59e0b;
    }

    .btn-secondary:hover {
      background-color: rgba(245, 158, 11, 0.1);
      transform: translateY(-2px);
    }

    /* Cards */
    .card {
      background-color: #242438;
      border-radius: 12px;
      padding: 2rem;
      border: 1px solid rgba(245, 158, 11, 0.1);
      transition: all 0.3s ease;
    }

    .card:hover {
      border-color: rgba(245, 158, 11, 0.3);
      box-shadow: 0 8px 24px rgba(245, 158, 11, 0.15);
      transform: translateY(-4px);
    }

    .card h3 {
      margin-top: 0;
      color: #f5f5f5;
    }

    .card-tag {
      display: inline-block;
      background-color: rgba(245, 158, 11, 0.15);
      color: #f59e0b;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.85rem;
      margin: 0.25rem 0.5rem 0.25rem 0;
    }

    /* Grid Layouts */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      margin: 2rem 0;
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    /* Section */
    section {
      margin: 3rem 0;
    }

    section h2 {
      margin-top: 0;
      padding-bottom: 1rem;
      border-bottom: 2px solid rgba(245, 158, 11, 0.2);
      margin-bottom: 2rem;
    }

    /* Blog Post List */
    .post-list {
      list-style: none;
    }

    .post-item {
      padding: 1.5rem;
      border-bottom: 1px solid rgba(245, 158, 11, 0.1);
      transition: all 0.3s ease;
      border-radius: 8px;
      margin-bottom: 1rem;
    }

    .post-item:hover {
      background-color: rgba(245, 158, 11, 0.05);
      padding-left: 2rem;
    }

    .post-item a {
      color: #f5f5f5;
      font-size: 1.25rem;
      font-weight: 600;
    }

    .post-item a:hover {
      color: #f59e0b;
    }

    .post-date {
      color: #999;
      font-size: 0.95rem;
      margin-top: 0.5rem;
    }

    .post-excerpt {
      color: #c0c0c8;
      margin-top: 0.75rem;
      font-size: 0.95rem;
    }

    /* About Section */
    .about-section {
      margin-bottom: 2rem;
    }

    .about-section h3 {
      color: #f59e0b;
      margin-top: 0;
    }

    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin: 1rem 0;
    }

    .skill-item {
      background-color: #242438;
      padding: 1rem;
      border-radius: 8px;
      border-left: 3px solid #f59e0b;
      transition: all 0.3s ease;
    }

    .skill-item:hover {
      border-left-color: #fbbf24;
      background-color: #2a2a3e;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .hero h1 {
        font-size: 2.5rem;
      }

      .hero .tagline {
        font-size: 1.1rem;
      }

      .nav-links {
        gap: 1rem;
        font-size: 0.9rem;
      }

      .wrapper {
        padding: 0 1rem;
      }

      .nav-wrapper {
        padding: 0 1rem;
      }

      .footer-wrapper {
        padding: 0 1rem;
      }

      h1 {
        font-size: 2rem;
      }

      h2 {
        font-size: 1.5rem;
      }

      .cta-buttons {
        flex-direction: column;
      }

      .btn {
        width: 100%;
        text-align: center;
      }
    }

    /* Code Blocks */
    pre {
      background-color: #0f0f1e;
      padding: 1rem;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid rgba(245, 158, 11, 0.1);
      margin: 1rem 0;
    }

    code {
      font-family: 'Courier New', monospace;
      font-size: 0.95rem;
      color: #a8f0a8;
    }

    pre code {
      color: #e8e8f0;
    }

    /* Blockquote */
    blockquote {
      border-left: 4px solid #f59e0b;
      padding-left: 1.5rem;
      margin: 1.5rem 0;
      color: #c0c0c8;
      font-style: italic;
    }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
    }

    th, td {
      padding: 1rem;
      text-align: left;
      border-bottom: 1px solid rgba(245, 158, 11, 0.1);
    }

    th {
      background-color: #242438;
      color: #f59e0b;
      font-weight: 600;
    }

    tr:hover {
      background-color: rgba(245, 158, 11, 0.05);
    }

    /* Utility Classes */
    .text-center {
      text-align: center;
    }

    .text-muted {
      color: #999;
    }

    .mt-1 { margin-top: 1rem; }
    .mt-2 { margin-top: 2rem; }
    .mt-3 { margin-top: 3rem; }
    .mb-1 { margin-bottom: 1rem; }
    .mb-2 { margin-bottom: 2rem; }
    .mb-3 { margin-bottom: 3rem; }

  </style>
</head>
<body>
  <!-- Navigation -->
  <nav class="site-nav">
    <div class="nav-wrapper">
      <a href="{{ '/' | prepend: site.baseurl }}" class="site-title">🔮 {{ site.title }}</a>
      <ul class="nav-links">
        <li><a href="{{ '/' | prepend: site.baseurl }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a></li>
        <li><a href="{{ '/about.html' | prepend: site.baseurl }}" {% if page.url contains 'about' %}class="active"{% endif %}>About</a></li>
        <li><a href="{{ '/projects.html' | prepend: site.baseurl }}" {% if page.url contains 'projects' %}class="active"{% endif %}>Projects</a></li>
        <li><a href="{{ '/blog.html' | prepend: site.baseurl }}" {% if page.url contains 'blog' %}class="active"{% endif %}>Blog</a></li>
      </ul>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="page-content" aria-label="Content">
    <div class="wrapper">
      {{ content }}
    </div>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-wrapper">
      <p>&copy; {{ 'now' | date: '%Y' }} <a href="https://knowledgecrystal.com">{{ site.title }}</a>. Built by Denson.</p>
      <p>{{ site.description }}</p>
    </div>
  </footer>

  <script>
    // Set active nav link based on current page
    document.addEventListener('DOMContentLoaded', function() {
      const currentLocation = window.location.pathname;
      const navLinks = document.querySelectorAll('.nav-links a');

      navLinks.forEach(link => {
        if (link.getAttribute('href') === currentLocation) {
          link.classList.add('active');
        }
      });
    });
  </script>
</body>
</html>
